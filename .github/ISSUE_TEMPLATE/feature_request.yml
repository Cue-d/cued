name: Feature Request
description: Suggest a Cued improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Cued do?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Data, Auth, Or Privacy Impact
      description: Note any new data synced, permissions requested, credentials stored, or third-party APIs used.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
