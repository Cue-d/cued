appId: so.cued.desktop
productName: Cued
copyright: Copyright © 2024-2025

directories:
  buildResources: resources
  output: dist

# Only include bundled output (all JS deps are bundled by Vite).
# Native modules are handled separately via extraResources below.
files:
  - out/**/*
  - "!node_modules"

# Copy native modules into app.asar.unpacked/node_modules/ so main process
# can resolve them at runtime from process.resourcesPath.
extraResources:
  - from: "resources/trayIconTemplate.png"
    to: "resources/trayIconTemplate.png"
  - from: "node_modules/better-sqlite3"
    to: "app.asar.unpacked/node_modules/better-sqlite3"
  - from: "node_modules/electron-liquid-glass"
    to: "app.asar.unpacked/node_modules/electron-liquid-glass"
  - from: "node_modules/bindings"
    to: "app.asar.unpacked/node_modules/bindings"
  - from: "node_modules/file-uri-to-path"
    to: "app.asar.unpacked/node_modules/file-uri-to-path"
  - from: "node_modules/node-gyp-build"
    to: "app.asar.unpacked/node_modules/node-gyp-build"
  - from: "node_modules/node-mac-contacts"
    to: "app.asar.unpacked/node_modules/node-mac-contacts"

publish:
  provider: github
  owner: Cue-d
  repo: cued-releases

# macOS configuration
mac:
  icon: icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSContactsUsageDescription: "Cued needs access to your contacts to sync and manage your relationships."

win:
  icon: icon.ico

linux:
  icon: icon.png

# DMG configuration
dmg:
  sign: true

# Notarization (requires APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID env vars)
afterSign: scripts/notarize.js

# Rebuild native modules for Electron
electronLanguages:
  - en

npmRebuild: true

# Build hooks
beforeBuild: scripts/rebuild-native.js
